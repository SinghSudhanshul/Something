name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-node:
    name: Quality (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9.1.2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm type-check
      - run: pnpm test

  quality-go:
    name: Quality (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.3'
      - run: go vet ./...
        working-directory: services/rides
      - run: go vet ./...
        working-directory: services/wallet

  quality-python:
    name: Quality (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [quality-node, quality-go, quality-python]
    strategy:
      matrix:
        service: [auth, bazaar, feast, swift, skills, pulse, trust, notifications, search, wallet, rides]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.node
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
