name: Deploy to Staging

on:
  push:
    branches: [main]

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all services
        run: npm run build

      - name: Run database migrations
        run: npm run migrate
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Deploy to Kubernetes (Staging)
        uses: azure/k8s-deploy@v4
        with:
          namespace: staging
          manifests: |
            infra/k8s/staging/auth-deployment.yaml
            infra/k8s/staging/user-deployment.yaml
            infra/k8s/staging/wallet-deployment.yaml
          images: |
            ghcr.io/${{ github.repository }}/auth-service:${{ github.sha }}
            ghcr.io/${{ github.repository }}/user-service:${{ github.sha }}
            ghcr.io/${{ github.repository }}/wallet-service:${{ github.sha }}

      - name: Run smoke tests
        run: |
          curl -f https://staging-api.campusly.in/health || exit 1
          curl -f https://staging-api.campusly.in/auth/health || exit 1
          curl -f https://staging-api.campusly.in/user/health || exit 1
          curl -f https://staging-api.campusly.in/wallet/health || exit 1

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          channel: '#deployments'
          text: |
            Staging deployment ${{ job.status }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
