<style>
        body {
            background-color: #F5F5F7; /* Fog */
            background-image: radial-gradient(circle at top right, rgba(175, 16, 26, 0.05) 0%, transparent 50%);
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        .viewfinder-corner {
            width: 40px;
            height: 40px;
            border-color: #af101a; /* primary */
            border-style: solid;
            position: absolute;
        }
        .corner-tl { top: 0; left: 0; border-width: 4px 0 0 4px; border-top-left-radius: 12px; }
        .corner-tr { top: 0; right: 0; border-width: 4px 4px 0 0; border-top-right-radius: 12px; }
        .corner-bl { bottom: 0; left: 0; border-width: 0 0 4px 4px; border-bottom-left-radius: 12px; }
        .corner-br { bottom: 0; right: 0; border-width: 0 4px 4px 0; border-bottom-right-radius: 12px; }
        
        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(175, 16, 26, 0.8), transparent);
            box-shadow: 0 0 8px rgba(175, 16, 26, 0.5);
            animation: scan 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes scan {
            0% { top: 5%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 95%; opacity: 0; }
        }
    </style>
