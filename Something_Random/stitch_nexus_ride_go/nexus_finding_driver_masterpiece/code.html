<style>
        /* Custom Ripple Animation for Dramatic Radar Effect */
        @keyframes custom-ripple {
            0% {
                transform: scale(0.5);
                opacity: 0.8;
                border-width: 2px;
            }
            100% {
                transform: scale(4);
                opacity: 0;
                border-width: 0px;
            }
        }

        .animate-radar-1 { animation: custom-ripple 4s cubic-bezier(0.25, 1, 0.5, 1) infinite; }
        .animate-radar-2 { animation: custom-ripple 4s cubic-bezier(0.25, 1, 0.5, 1) infinite 1.3s; }
        .animate-radar-3 { animation: custom-ripple 4s cubic-bezier(0.25, 1, 0.5, 1) infinite 2.6s; }

        /* Hide scrollbar for the safety carousel */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Ensure Material Symbols render correctly */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background selection:bg-primary selection:text-on-primary antialiased">
<!-- Subdued Light Bleed Background Effect -->
<div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[80vw] h-[80vw] max-w-[800px] max-h-[800px] bg-primary/5 rounded-full blur-[100px] pointer-events-none z-0"></div>
<main class="relative z-10 min-h-screen flex flex-col items-center justify-between p-6 md:p-12 overflow-hidden max-w-[1440px] mx-auto">
<!-- Top Spacer (Nav Suppressed for Transactional Intent) -->
<header class="w-full flex justify-center pt-4">
<!-- Minimal Branding Anchor -->
<span class="font-label-md text-label-md tracking-[0.2em] uppercase text-outline">Nexus Masterpiece</span>
</header>
<!-- Center: Radar & Typography -->
<section class="flex-1 w-full flex flex-col items-center justify-center relative mt-8 mb-16">
<!-- Radar Animation Cluster -->
<div class="relative w-48 h-48 md:w-64 md:h-64 flex items-center justify-center mb-16">
<!-- Ripples -->
<div class="absolute inset-0 rounded-full border-primary text-primary/40 animate-radar-1"></div>
<div class="absolute inset-0 rounded-full border-primary text-primary/40 animate-radar-2"></div>
<div class="absolute inset-0 rounded-full border-primary text-primary/40 animate-radar-3"></div>
<!-- Core Nexus Node -->
<div class="relative z-10 w-20 h-20 md:w-24 md:h-24 bg-surface rounded-full flex items-center justify-center shadow-[0_0_40px_rgba(175,16,26,0.15)] border border-outline-variant/30">
<div class="w-16 h-16 md:w-20 md:h-20 bg-primary rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary text-3xl md:text-4xl">radar</span>
</div>
</div>
</div>
<!-- Massive Typography Anchor -->
<div class="text-center px-4 max-w-4xl relative z-20">
<h1 class="font-display-lg-mobile text-display-lg-mobile md:font-display-xl md:text-display-xl uppercase text-on-background flex flex-col items-center gap-2 mix-blend-darken">
<span class="block">Finding Your</span>
<span class="block text-primary">Masterpiece Ride</span>
</h1>
</div>
</section>
<!-- Bottom: Safety Carousel & Actions -->
<section class="w-full max-w-2xl flex flex-col items-center gap-10 pb-8 z-20">
<!-- Safety Highlights Carousel -->
<div class="w-full relative">
<!-- Gradient Masks for scroll indication -->
<div class="absolute left-0 top-0 bottom-0 w-8 bg-gradient-to-r from-background to-transparent z-10 pointer-events-none md:hidden"></div>
<div class="absolute right-0 top-0 bottom-0 w-8 bg-gradient-to-l from-background to-transparent z-10 pointer-events-none md:hidden"></div>
<div class="flex gap-4 overflow-x-auto no-scrollbar snap-x snap-mandatory px-4 md:justify-center">
<!-- Item: Verified Drivers -->
<div class="snap-center shrink-0 bg-surface/80 backdrop-blur-xl border border-outline-variant/50 rounded-full px-6 py-3 flex items-center gap-3 transition-transform duration-[0.344s] hover:scale-105 cursor-default shadow-sm">
<span class="material-symbols-outlined text-primary text-lg">verified_user</span>
<span class="font-label-md text-label-md text-on-surface">Verified Student Drivers</span>
</div>
<!-- Item: SOS Link -->
<div class="snap-center shrink-0 bg-surface/80 backdrop-blur-xl border border-outline-variant/50 rounded-full px-6 py-3 flex items-center gap-3 transition-transform duration-[0.344s] hover:scale-105 cursor-default shadow-sm">
<span class="material-symbols-outlined text-primary text-lg">emergency</span>
<span class="font-label-md text-label-md text-on-surface">24/7 SOS Link</span>
</div>
<!-- Item: Encryption -->
<div class="snap-center shrink-0 bg-surface/80 backdrop-blur-xl border border-outline-variant/50 rounded-full px-6 py-3 flex items-center gap-3 transition-transform duration-[0.344s] hover:scale-105 cursor-default shadow-sm">
<span class="material-symbols-outlined text-primary text-lg">lock</span>
<span class="font-label-md text-label-md text-on-surface">Ride Encryption</span>
</div>
</div>
</div>
<!-- Minimal Cancel Action -->
<button class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors duration-[0.344s] ease-in-out uppercase tracking-widest relative group active:scale-95">
                Cancel Search
                <!-- Underline animation -->
<span class="absolute -bottom-1 left-1/2 w-0 h-[1px] bg-primary transition-all duration-[0.344s] ease-in-out group-hover:w-full group-hover:left-0"></span>
</button>
</section>
</main>
