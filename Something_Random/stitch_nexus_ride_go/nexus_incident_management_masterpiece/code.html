<style>
        body {
            background-color: #F5F5F7; /* Fog Base */
            color: #271816; /* on-background */

<body class="font-body-md text-body-md antialiased min-h-screen relative pb-32 md:pb-0">
<!-- TopAppBar (From JSON) -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-surface-container-highest/80 backdrop-blur-md border-b border-outline-variant/30 transition-all duration-[0.344s] ease-in-out">
<div class="flex justify-between items-center px-margin-mobile h-16 max-w-[1440px] mx-auto">
<!-- Leading Avatar -->
<div class="flex items-center hover:opacity-80 transition-opacity duration-[0.344s] cursor-pointer">
<img alt="Driver Profile Portrait" class="w-10 h-10 rounded-full object-cover border border-outline-variant/30" data-alt="A small, professional portrait photograph of a stern-looking driver in a crisp white uniform, set against a stark, high-contrast black background, exuding authority and precision in a high-end editorial style." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBxovJWJAxFO7kw5lg6pNLgOJqGCrMc8-IGqo6_6rB1dmmloMXZzLPZYz5nKnX0uKpaz96IXGy2TUjgqaxTAgV100V4FCNJeoc8lHFFVEe7FkZMoQRft4Tnk8JDWYo-1becWTlDhePk68mA-gYXcyb89d0A92DMRCGbg9B5ATovV3JxUfpwL-ZgzhLyjvL3eeCnwiEoCUZ0BWYK_Y8qnVtnh1AwBpWoNd96b9UVn_Vgs1kvEfi4dUH_4hw5n0Gjn4Nefmw4RTNcaA"/>
</div>
<!-- Headline / Brand -->
<div class="font-display-lg text-display-lg-mobile md:font-display-lg md:text-display-lg tracking-tighter text-primary dark:text-primary-fixed cursor-pointer hover:opacity-80 transition-opacity duration-[0.344s]">
                Nexus
            </div>
<!-- Trailing Icon -->
<div class="flex items-center text-primary dark:text-primary-fixed hover:opacity-80 transition-opacity duration-[0.344s] cursor-pointer">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 0;">notifications</span>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="pt-32 px-4 md:px-gutter max-w-[1440px] mx-auto">
<!-- Hero Section: Incident Protocol Initiation -->
<section class="mb-section-gap">
<div class="max-w-3xl mx-auto text-center space-y-8">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-error-container text-on-error-container mb-4">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">warning</span>
</div>
<h1 class="font-display-xl text-display-lg-mobile md:text-display-xl text-on-surface">Incident Protocol</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl mx-auto">
                    Initiate immediate response procedures. Select the primary categorization below to alert Nexus Command and secure local assets.
                </p>
</div>
</section>
<!-- Categorization Bento Grid -->
<section class="mb-section-gap">
<div class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-5xl mx-auto">
<!-- Category 1: Vehicle Issue -->
<button class="bg-surface-container-lowest rounded-card p-card-padding border border-outline-variant/30 text-left hover:-translate-y-1 smooth-transition group focus:outline-none focus:ring-1 focus:ring-primary">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant group-hover:bg-primary-container group-hover:text-on-primary-container smooth-transition mb-6">
<span class="material-symbols-outlined">car_crash</span>
</div>
<h3 class="font-headline-sm text-headline-sm text-on-surface mb-2">Vehicle Issue</h3>
<p class="text-on-surface-variant">Mechanical failure, sensory degradation, or structural compromise requiring immediate technical intervention.</p>
</button>
<!-- Category 2: Passenger Conflict -->
<button class="bg-surface-container-lowest rounded-card p-card-padding border border-outline-variant/30 text-left hover:-translate-y-1 smooth-transition group focus:outline-none focus:ring-1 focus:ring-primary ring-1 ring-primary">
<div class="w-12 h-12 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center mb-6">
<span class="material-symbols-outlined">group_remove</span>
</div>
<h3 class="font-headline-sm text-headline-sm text-on-surface mb-2">Passenger Conflict</h3>
<p class="text-on-surface-variant">Hostile interactions, medical emergencies, or non-compliance requiring protocol enforcement.</p>
</button>
<!-- Category 3: Road Obstruction -->
<button class="bg-surface-container-lowest rounded-card p-card-padding border border-outline-variant/30 text-left hover:-translate-y-1 smooth-transition group focus:outline-none focus:ring-1 focus:ring-primary">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant group-hover:bg-primary-container group-hover:text-on-primary-container smooth-transition mb-6">
<span class="material-symbols-outlined">traffic</span>
</div>
<h3 class="font-headline-sm text-headline-sm text-on-surface mb-2">Road Obstruction</h3>
<p class="text-on-surface-variant">Uncharted environmental hazards, route blockages, or severe meteorological events.</p>
</button>
</div>
</section>
<!-- Live Evidence Portal & Details -->
<section class="mb-section-gap max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
<!-- Left Column: Details Form -->
<div class="lg:col-span-5 space-y-6">
<div class="bg-surface-container-lowest rounded-card p-card-padding border border-outline-variant/30 h-full flex flex-col justify-between">
<div>
<h2 class="font-headline-md text-headline-md text-on-surface mb-6">Incident Details</h2>
<div class="space-y-6">
<!-- Input Field -->
<div class="flex flex-col">
<label class="font-label-md text-label-md text-on-surface-variant mb-2">Severity Level</label>
<div class="relative">
<select class="w-full bg-surface-container-lowest border border-outline-variant/50 rounded-full py-3 px-6 text-on-surface appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary smooth-transition">
<option>Critical (Code Red)</option>
<option>Elevated (Code Orange)</option>
<option>Standard (Code Yellow)</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
<!-- Input Field -->
<div class="flex flex-col">
<label class="font-label-md text-label-md text-on-surface-variant mb-2">Initial Observation</label>
<textarea class="w-full bg-surface-container-lowest border border-outline-variant/50 rounded-xl py-3 px-6 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary smooth-transition resize-none h-32" placeholder="Detail the immediate situational context..."></textarea>
</div>
</div>
</div>
<div class="pt-8">
<!-- Initiation Button -->
<button class="w-full bg-primary text-on-primary rounded-full py-4 px-8 font-label-md text-label-md uppercase tracking-widest hover:opacity-90 active:scale-95 smooth-transition flex items-center justify-center gap-3">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">cell_tower</span>
                            Contact HQ
                        </button>
</div>
</div>
</div>
<!-- Right Column: Live Evidence -->
<div class="lg:col-span-7">
<div class="bg-surface-container-lowest rounded-card p-2 border border-outline-variant/30 h-[600px] relative overflow-hidden group">
<!-- Camera Feed Image -->
<img alt="Live Cabin Feed" class="w-full h-full object-cover rounded-[24px]" data-alt="A grainy, high-contrast security camera perspective from inside a sleek, modern autonomous vehicle. The interior is bathed in harsh, stark white light, illuminating a tense passenger interaction. Deep crimson digital overlays and timestamp artifacts frame the edges of the image, contributing to a clinical, urgent, and authoritative surveillance aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCyG_FvrfMayZ8e1DLYg85-JckAsX2okb9loAlXcfnPRolboT726eqdlKIqbHIkFs676a-L8YBv1Oxk_zqa0CcMSgYFVUPq_hbMgYOXy8HM6pT_N7HpRCOyAp0BO_9d8ul_OSfUgbo0in-QtxcuEf-TGD-3a8NJThGozkFaq0rG_35_wpHu5xKcfKanQKGPG61QdJdvJI9WCF6jDr6FEG-CrBrBReKI0fU1biolCKk0xqD1Ky-GU8v_N8s5Kisvr2QHKFApfAWu_A"/>
<!-- Glassmorphic Overlay UI -->
<div class="absolute inset-4 pointer-events-none flex flex-col justify-between">
<!-- Top HUD -->
<div class="flex justify-between items-start">
<div class="glass-panel px-4 py-2 rounded-full flex items-center gap-2 text-primary font-label-md text-label-md uppercase tracking-wider">
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
                                Live Evidence Portal
                            </div>
<div class="glass-panel px-3 py-2 rounded-lg flex flex-col items-end text-on-surface">
<span class="font-label-md text-label-md opacity-70">Cam_04_Cabin_Aft</span>
<span class="font-body-md text-body-md font-mono">REC // 00:14:22</span>
</div>
</div>
<!-- Bottom Controls (Decorative) -->
<div class="flex justify-center gap-4">
<div class="glass-panel p-3 rounded-full flex items-center justify-center text-on-surface hover:text-primary cursor-pointer pointer-events-auto smooth-transition">
<span class="material-symbols-outlined text-[24px]">photo_camera</span>
</div>
<div class="glass-panel p-3 rounded-full flex items-center justify-center text-on-surface hover:text-primary cursor-pointer pointer-events-auto smooth-transition">
<span class="material-symbols-outlined text-[24px]">mic</span>
</div>
<div class="glass-panel p-3 rounded-full flex items-center justify-center text-on-surface hover:text-primary cursor-pointer pointer-events-auto smooth-transition">
<span class="material-symbols-outlined text-[24px]">fullscreen</span>
</div>
</div>
</div>
</div>
</div>
</section>
</main>

<!-- Note: Semantic Intent matching: This is a top-level action, but doesn't perfectly match the options. Highlighting 'Shift' as it's part of active duty. -->
<nav class="fixed bottom-0 w-full z-50 bg-white/80 dark:bg-surface-container-highest/80 backdrop-blur-md border-t border-outline-variant/30 flex justify-around items-center h-20 pb-safe px-4 md:hidden transition-all duration-[0.344s] ease-in-out">
<!-- Tab 1: Shift (Active) -->
<button class="flex flex-col items-center justify-center text-primary dark:text-primary-fixed font-bold hover:text-primary transition-colors duration-[0.344s] active:scale-95 ease-in-out w-16">
<span class="material-symbols-outlined text-[24px] mb-1" style="font-variation-settings: 'FILL' 1;">speed</span>
<span class="font-label-md text-label-md">Shift</span>
</button>
<!-- Tab 2: Requests -->
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-secondary-fixed-variant hover:text-primary transition-colors duration-[0.344s] active:scale-95 ease-in-out w-16">
<span class="material-symbols-outlined text-[24px] mb-1" style="font-variation-settings: 'FILL' 0;">priority_high</span>
<span class="font-label-md text-label-md">Requests</span>
</button>
<!-- Tab 3: Navigate -->
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-secondary-fixed-variant hover:text-primary transition-colors duration-[0.344s] active:scale-95 ease-in-out w-16">
<span class="material-symbols-outlined text-[24px] mb-1" style="font-variation-settings: 'FILL' 0;">explore</span>
<span class="font-label-md text-label-md">Navigate</span>
</button>
<!-- Tab 4: Analytics -->
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-secondary-fixed-variant hover:text-primary transition-colors duration-[0.344s] active:scale-95 ease-in-out w-16">
<span class="material-symbols-outlined text-[24px] mb-1" style="font-variation-settings: 'FILL' 0;">leaderboard</span>
<span class="font-label-md text-label-md">Analytics</span>
</button>
<!-- Tab 5: Fleet -->
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-secondary-fixed-variant hover:text-primary transition-colors duration-[0.344s] active:scale-95 ease-in-out w-16">
<span class="material-symbols-outlined text-[24px] mb-1" style="font-variation-settings: 'FILL' 0;">local_shipping</span>
<span class="font-label-md text-label-md">Fleet</span>
</button>
</nav>
</body></html>
