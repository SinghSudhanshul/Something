<script>
        // Simple slider logic for visual demonstration
        const container = document.getElementById('accept-slider-container');
        const thumb = document.getElementById('accept-slider-thumb');
        let isDragging = false;
        let startX;
        let currentX = 0;
        const maxScroll = container.offsetWidth - thumb.offsetWidth - 16; // 16px for padding

        thumb.addEventListener('mousedown', startDrag);
        thumb.addEventListener('touchstart', startDrag, {passive: true});

        document.addEventListener('mousemove', drag);
        document.addEventListener('touchmove', drag, {passive: false});

        document.addEventListener('mouseup', endDrag);
        document.addEventListener('touchend', endDrag);

        function startDrag(e) {
            isDragging = true;
            thumb.classList.add('dragging');
            startX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            // Provide subtle haptic feedback if available
            if (navigator.vibrate) navigator.vibrate(10);
        }

        function drag(e) {
            if (!isDragging) return;
            e.preventDefault(); // Prevent scrolling on touch
            
            const x = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            const walk = x - startX;
            currentX = Math.max(0, Math.min(walk, maxScroll));
            
            thumb.style.transform = `translateX(${currentX}px) scale(0.95)`;
            
            // Visual feedback based on progress
            const progress = currentX / maxScroll;
            container.style.backgroundColor = `rgba(175, 16, 26, ${0.1 + (progress * 0.2)})`;
        }

        function endDrag() {
            if (!isDragging) return;
            isDragging = false;
            thumb.classList.remove('dragging');
            
            if (currentX > maxScroll * 0.8) {
                // Accepted
                thumb.style.transform = `translateX(${maxScroll}px)`;
                if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
                thumb.innerHTML = `<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check</span>`;
                setTimeout(() => {
                    alert('Ride Accepted');
                    // Reset
                    currentX = 0;
                    thumb.style.transform = `translateX(0px)`;
                    thumb.innerHTML = `<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>`;
                    container.style.backgroundColor = '';
                }, 500);
            } else {
                // Snap back
                currentX = 0;
                thumb.style.transition = 'transform 0.344s cubic-bezier(0.4, 0, 0.2, 1)';
                thumb.style.transform = `translateX(0px)`;
                container.style.backgroundColor = '';
                setTimeout(() => {
                    thumb.style.transition = 'transform 0.1s';
                }, 344);
            }
        }
    </script>
