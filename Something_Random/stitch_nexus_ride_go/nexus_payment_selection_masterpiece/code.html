<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Payment Selection - NEXUS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed-variant": "#930010",
                        "inverse-on-surface": "#ffedeb",
                        "tertiary-fixed-dim": "#7bd1f8",
                        "outline-variant": "#e4beba",
                        "primary-fixed-dim": "#ffb3ac",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed": "#410003",
                        "tertiary-fixed": "#bee9ff",
                        "tertiary": "#005f7b",
                        "on-secondary-container": "#600009",
                        "primary-fixed": "#ffdad6",
                        "on-surface": "#271816",
                        "inverse-surface": "#3e2c2a",
                        "error": "#ba1a1a",
                        "secondary": "#b3272a",
                        "on-error": "#ffffff",
                        "on-surface-variant": "#5b403d",
                        "outline": "#8f6f6c",
                        "secondary-container": "#fc5d59",
                        "on-error-container": "#93000a",
                        "inverse-primary": "#ffb3ac",
                        "surface-container-highest": "#f9dcd9",
                        "surface-bright": "#fff8f7",
                        "on-tertiary-fixed-variant": "#004d65",
                        "surface": "#fff8f7",
                        "surface-dim": "#f1d3d0",
                        "background": "#fff8f7",
                        "on-secondary": "#ffffff",
                        "surface-container": "#ffe9e7",
                        "on-tertiary-fixed": "#001f2a",
                        "surface-variant": "#f9dcd9",
                        "tertiary-container": "#00799c",
                        "on-tertiary-container": "#e9f7ff",
                        "surface-tint": "#ba1a20",
                        "on-secondary-fixed-variant": "#910816",
                        "secondary-fixed": "#ffdad7",
                        "surface-container-low": "#fff0ef",
                        "on-secondary-fixed": "#410004",
                        "secondary-fixed-dim": "#ffb3ae",
                        "error-container": "#ffdad6",
                        "surface-container-high": "#ffe2de",
                        "on-primary": "#ffffff",
                        "primary-container": "#d32f2f",
                        "primary": "#af101a",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-container": "#fff2f0",
                        "on-background": "#271816"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px",
                        "28": "28px"
                    },
                    "spacing": {
                        "base": "8px",
                        "section-gap": "120px",
                        "gutter": "24px",
                        "margin-mobile": "20px",
                        "margin-desktop": "auto",
                        "card-padding": "40px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter", "sans-serif"],
                        "body-lg": ["Inter", "sans-serif"],
                        "headline-sm": ["Inter", "sans-serif"],
                        "display-xl": ["Inter", "sans-serif"],
                        "display-lg": ["Inter", "sans-serif"],
                        "label-md": ["Inter", "sans-serif"],
                        "display-lg-mobile": ["Inter", "sans-serif"],
                        "body-md": ["Inter", "sans-serif"]
                    },
                    "fontSize": {
                        "headline-md": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.015em", "fontWeight": "700" }],
                        "body-lg": ["19px", { "lineHeight": "1.5", "letterSpacing": "0", "fontWeight": "400" }],
                        "headline-sm": ["24px", { "lineHeight": "1.2", "letterSpacing": "-0.015em", "fontWeight": "700" }],
                        "display-xl": ["80px", { "lineHeight": "1.05", "letterSpacing": "-0.022em", "fontWeight": "700" }],
                        "display-lg": ["56px", { "lineHeight": "1.1", "letterSpacing": "-0.022em", "fontWeight": "700" }],
                        "label-md": ["14px", { "lineHeight": "1.2", "letterSpacing": "0.02em", "fontWeight": "600" }],
                        "display-lg-mobile": ["40px", { "lineHeight": "1.1", "letterSpacing": "-0.022em", "fontWeight": "700" }],
                        "body-md": ["17px", { "lineHeight": "1.47", "letterSpacing": "-0.01em", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body { font-family: 'Inter', sans-serif; background-color: #F5F5F7; }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(228, 190, 186, 0.3);
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .material-symbols-outlined.fill { font-variation-settings: 'FILL' 1; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#F5F5F7] text-on-surface min-h-screen flex flex-col items-center">
<!-- TopAppBar (Suppressed structurally since this is transactional, but we keep a back button header for context) -->
<header class="w-full max-w-[1440px] flex justify-between items-center px-gutter h-20 pt-8 bg-transparent fixed top-0 z-50">
<button class="text-on-surface hover:text-primary transition-colors duration-[0.344s] ease-in-out p-2 rounded-full active:scale-95">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="font-headline-md text-headline-md font-bold tracking-tighter text-primary">NEXUS</div>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="w-full max-w-2xl px-gutter pt-32 pb-32 flex-grow flex flex-col">
<div class="mb-12">
<h1 class="font-display-lg-mobile text-display-lg-mobile md:font-display-lg md:text-display-lg text-on-surface mb-4">SELECT INVESTMENT</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Choose your preferred method to complete this transaction securely.</p>
</div>
<div class="space-y-6 flex-grow">
<!-- Nexus Wallet -->
<label class="glass-card rounded-28 p-6 md:p-card-padding flex items-center cursor-pointer hover:border-primary transition-all duration-[0.344s] ease-in-out group relative overflow-hidden">
<input checked="" class="peer sr-only" name="payment_method" type="radio" value="wallet"/>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant peer-checked:border-primary flex items-center justify-center mr-6 transition-colors duration-[0.344s]">
<div class="w-3 h-3 rounded-full bg-primary scale-0 peer-checked:scale-100 transition-transform duration-[0.344s] ease-in-out"></div>
</div>
<div class="flex-grow flex items-center">
<div class="w-12 h-12 rounded-full bg-surface-variant flex items-center justify-center text-primary mr-4 group-hover:bg-primary group-hover:text-on-primary transition-colors duration-[0.344s]">
<span class="material-symbols-outlined fill" data-icon="account_balance_wallet" data-weight="fill">account_balance_wallet</span>
</div>
<div>
<h3 class="font-headline-sm text-headline-sm text-on-surface">Nexus Wallet</h3>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Balance: $4,250.00</p>
</div>
</div>
</label>
<!-- UPI -->
<label class="glass-card rounded-28 p-6 md:p-card-padding flex items-center cursor-pointer hover:border-primary transition-all duration-[0.344s] ease-in-out group relative overflow-hidden">
<input class="peer sr-only" name="payment_method" type="radio" value="upi"/>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant peer-checked:border-primary flex items-center justify-center mr-6 transition-colors duration-[0.344s]">
<div class="w-3 h-3 rounded-full bg-primary scale-0 peer-checked:scale-100 transition-transform duration-[0.344s] ease-in-out"></div>
</div>
<div class="flex-grow flex items-center">
<div class="w-12 h-12 rounded-full bg-surface-variant flex items-center justify-center text-primary mr-4 group-hover:bg-primary group-hover:text-on-primary transition-colors duration-[0.344s]">
<span class="material-symbols-outlined" data-icon="qr_code_scanner">qr_code_scanner</span>
</div>
<div>
<h3 class="font-headline-sm text-headline-sm text-on-surface">UPI <span class="text-secondary font-label-md text-label-md ml-2 px-2 py-1 bg-surface-variant rounded-full">(Instant)</span></h3>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Scan or enter UPI ID</p>
</div>
</div>
</label>
<!-- Credit/Debit Card -->
<label class="glass-card rounded-28 p-6 md:p-card-padding flex items-center cursor-pointer hover:border-primary transition-all duration-[0.344s] ease-in-out group relative overflow-hidden">
<input class="peer sr-only" name="payment_method" type="radio" value="card"/>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant peer-checked:border-primary flex items-center justify-center mr-6 transition-colors duration-[0.344s]">
<div class="w-3 h-3 rounded-full bg-primary scale-0 peer-checked:scale-100 transition-transform duration-[0.344s] ease-in-out"></div>
</div>
<div class="flex-grow flex items-center">
<div class="w-12 h-12 rounded-full bg-surface-variant flex items-center justify-center text-primary mr-4 group-hover:bg-primary group-hover:text-on-primary transition-colors duration-[0.344s]">
<span class="material-symbols-outlined" data-icon="credit_card">credit_card</span>
</div>
<div>
<h3 class="font-headline-sm text-headline-sm text-on-surface">Credit/Debit Card</h3>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Visa, Mastercard, Amex</p>
</div>
</div>
</label>
<!-- Cash on Delivery -->
<label class="glass-card rounded-28 p-6 md:p-card-padding flex items-start cursor-pointer hover:border-primary transition-all duration-[0.344s] ease-in-out group relative overflow-hidden">
<input class="peer sr-only" name="payment_method" type="radio" value="cod"/>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant peer-checked:border-primary flex items-center justify-center mr-6 mt-3 transition-colors duration-[0.344s]">
<div class="w-3 h-3 rounded-full bg-primary scale-0 peer-checked:scale-100 transition-transform duration-[0.344s] ease-in-out"></div>
</div>
<div class="flex-grow">
<div class="flex items-center mb-2">
<div class="w-12 h-12 rounded-full bg-surface-variant flex items-center justify-center text-primary mr-4 group-hover:bg-primary group-hover:text-on-primary transition-colors duration-[0.344s]">
<span class="material-symbols-outlined" data-icon="local_shipping">local_shipping</span>
</div>
<h3 class="font-headline-sm text-headline-sm text-on-surface">Cash on Delivery (COD)</h3>
</div>
<div class="ml-16 bg-surface-variant/50 p-4 rounded-xl border border-outline-variant/30">
<p class="font-label-md text-label-md text-secondary flex items-center">
<span class="material-symbols-outlined text-[16px] mr-2" data-icon="gpp_maybe">gpp_maybe</span>
                            Safety protocol: Photo verification required
                        </p>
</div>
</div>
</label>
</div>
</main>
<!-- Sticky Bottom Action -->
<div class="fixed bottom-0 w-full glass-card border-t border-outline-variant/30 p-6 md:p-8 flex justify-center z-40 bg-surface/90">
<div class="w-full max-w-2xl">
<button class="w-full bg-primary text-on-primary font-headline-sm text-headline-sm py-5 rounded-full hover:bg-primary-container hover:text-on-primary-container transition-all duration-[0.344s] ease-in-out active:scale-[0.98]">
                Confirm Payment
            </button>
</div>
</div>
</body></html>
