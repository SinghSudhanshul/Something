<script>
        // Simple star rating interaction
        const stars = document.querySelectorAll('.star-btn');
        stars.forEach((star, index) => {
            star.addEventListener('click', () => {
                stars.forEach((s, i) => {
                    const icon = s.querySelector('span');
                    if (i <= index) {
                        icon.style.fontVariationSettings = "'FILL' 1";
                        s.classList.replace('text-outline', 'text-primary');
                    } else {
                        icon.style.fontVariationSettings = "'FILL' 0";
                        s.classList.replace('text-primary', 'text-outline');
                    }
                });
            });
            
            // Hover effects for rating
            star.addEventListener('mouseenter', () => {
                 stars.forEach((s, i) => {
                    const icon = s.querySelector('span');
                    if (i <= index) {
                         icon.style.fontVariationSettings = "'FILL' 1";
                    }
                 });
            });
            
             star.addEventListener('mouseleave', () => {
                 stars.forEach((s) => {
                     if(!s.classList.contains('text-primary')) {
                         const icon = s.querySelector('span');
                         icon.style.fontVariationSettings = "'FILL' 0";
                     }
                 });
            });
        });
    </script>
