<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_74 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_74" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_74');
  const devicePixelRatio = window.devicePixelRatio || 1;
  (function() {
  const container = document.getElementById('threejs-container-ANIMATION_N');
  const width = container.clientWidth || window.innerWidth;
  const height = container.clientHeight || window.innerHeight;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });

  renderer.setSize(width, height);
  renderer.setPixelRatio(window.devicePixelRatio);
  container.appendChild(renderer.domElement);

  // Group for the complex data node
  const group = new THREE.Group();
  scene.add(group);

  // Central Core
  const coreGeo = new THREE.IcosahedronGeometry(1, 2);
  const coreMat = new THREE.MeshPhongMaterial({ 
    color: 0xd32f2f, 
    emissive: 0x440000,
    wireframe: false,
    flatShading: true
  });
  const core = new THREE.Mesh(coreGeo, coreMat);
  group.add(core);

  // Floating Data Rings
  const ringGeo = new THREE.TorusGeometry(1.6, 0.02, 16, 100);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0xd32f2f, transparent: true, opacity: 0.4 });
  
  const ring1 = new THREE.Mesh(ringGeo, ringMat);
  const ring2 = new THREE.Mesh(ringGeo, ringMat);
  ring2.rotation.x = Math.PI / 2;
  group.add(ring1);
  group.add(ring2);

  // Floating Particles
  const pointsGeo = new THREE.BufferGeometry();
  const pointsCoords = [];
  for(let i = 0; i < 500; i++) {
    pointsCoords.push((Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10);
  }
  pointsGeo.setAttribute('position', new THREE.Float32BufferAttribute(pointsCoords, 3));
  const pointsMat = new THREE.PointsMaterial({ color: 0xd32f2f, size: 0.05, transparent: true, opacity: 0.8 });
  const particles = new THREE.Points(pointsGeo, pointsMat);
  scene.add(particles);

  const light = new THREE.PointLight(0xffffff, 1, 100);
  light.position.set(5, 5, 5);
  scene.add(light);
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));

  camera.position.z = 5;

  function animate() {
    requestAnimationFrame(animate);
    group.rotation.y += 0.005;
    group.rotation.x += 0.002;
    particles.rotation.y -= 0.001;
    
    const time = Date.now() * 0.001;
    core.scale.setScalar(1 + Math.sin(time * 2) * 0.05);
    
    renderer.render(scene, camera);
  }

  window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  });

  animate();
})();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_74 -->
</body>
</html>
